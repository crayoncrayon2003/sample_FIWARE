[DEFAULT]
# Host used by these Python scripts (running on the host) to reach Orion / QuantumLeap.
HOST_IP = localhost
# Host used by Orion (running inside its container) to reach notification targets.
# QuantumLeap is reachable by its docker-compose service name on the fiware-network.
QUANTUMLEAP_HOST = quantumleap
# The sample WebServer (Step20) runs on the host, so Orion reaches it via the docker host gateway.
WEBSERVER_HOST = host.docker.internal
